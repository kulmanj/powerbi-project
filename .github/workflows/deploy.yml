name: Power BI CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Power BI CLI
      run: npm install -g powerbi-cli

    - name: Login to Power BI
      run: |
        pbicli login --service-principal \
        -t ${{ secrets.TENANT_ID }} \
        -i ${{ secrets.CLIENT_ID }} \
        -s ${{ secrets.CLIENT_SECRET }}

    - name: Deploy PBIP Project
      run: |
        pbicli import pbip \
        --workspace ${{ secrets.WORKSPACE_ID }} \
        --path . \
        --name "Auto Deploy Report"
