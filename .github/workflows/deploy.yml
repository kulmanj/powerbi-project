name: Power BI CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Power BI CLI
      run: |
        npm install -g powerbi-cli
        echo "$(npm bin -g)" >> $GITHUB_PATH

    - name: Verify CLI
      run: |
        pbicli --version

    - name: Login to Power BI
      run: |
        pbicli login --service-principal \
        -t ${{ secrets.TENANT_ID }} \
        -i ${{ secrets.CLIENT_ID }} \
        -s ${{ secrets.CLIENT_SECRET }}

    - name: Test Workspace Access
      run: |
        pbicli group list
